<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Мои воспоминания</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <link rel="stylesheet" href="/miniapp/styles.css?v=2">
</head>
<body>
  <div id="app">
    <div id="loading">Загрузка…</div>
    <div id="screens" class="hidden">
      <!-- Home -->
      <div id="screen-home" class="screen">
        <header class="home-header">
          <h1 class="home-title">Расскажите свою историю</h1>
        </header>
        <div class="home-illustration" id="home-illustration">
          <svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect width="200" height="160" fill="#e8dcc8"/>
            <circle cx="100" cy="70" r="25" fill="#c4b5a0"/>
            <path d="M60 120 Q100 100 140 120" stroke="#2d6a4f" stroke-width="3" fill="none"/>
            <rect x="70" y="95" width="60" height="45" rx="4" fill="#f5e6d3" stroke="#2d6a4f" stroke-width="1"/>
            <rect x="78" y="103" width="15" height="12" fill="#2d6a4f" opacity="0.3"/>
            <rect x="98" y="103" width="15" height="12" fill="#2d6a4f" opacity="0.3"/>
            <rect x="78" y="118" width="15" height="12" fill="#2d6a4f" opacity="0.3"/>
            <rect x="98" y="118" width="15" height="12" fill="#2d6a4f" opacity="0.3"/>
          </svg>
        </div>
        <div class="home-record-area">
          <p class="home-hint">Нажмите и удерживайте кнопку, пока говорите</p>
          <button id="btn-record-home" class="btn-record-main">
            <span class="btn-mic-icon"></span>
            <span id="home-record-status" class="btn-record-label">Записать</span>
          </button>
        </div>
        <nav class="home-menu">
          <button class="home-menu-btn" data-screen="record">Ввести текст</button>
          <button class="home-menu-btn" data-screen="book">Моя книга</button>
          <button class="home-menu-btn" data-screen="chapters">Главы</button>
          <button class="home-menu-btn" data-screen="subscription">Подписка</button>
        </nav>
      </div>

      <!-- Record -->
      <div id="screen-record" class="screen hidden">
        <header class="header">
          <button class="back" data-back>← Назад</button>
          <h2>Записать воспоминание</h2>
        </header>
        <div class="form">
          <button id="btn-record-voice" class="btn-record">
            <span class="btn-mic-icon"></span>
            <span id="record-status">Зажмите и говорите</span>
          </button>
          <p class="hint">Зажмите кнопку — идёт запись, отпустите — сохраняется</p>
          <hr class="record-divider">
          <textarea id="memory-text" placeholder="Или введите текст…" rows="4"></textarea>
          <button id="btn-save-memory" class="btn-primary">Сохранить текст</button>
        </div>
      </div>

      <!-- Book -->
      <div id="screen-book" class="screen hidden">
        <header class="header">
          <button class="back" data-back>← Назад</button>
          <h2>Моя книга</h2>
        </header>
        <div id="book-content" class="book-content"></div>
        <div class="book-actions">
          <button id="btn-download-pdf" class="btn-primary">Скачать PDF</button>
        </div>
      </div>

      <!-- Chapters -->
      <div id="screen-chapters" class="screen hidden">
        <header class="header">
          <button class="back" data-back>← Назад</button>
          <h2>Главы</h2>
          <p class="hint">Зажмите и перетащите главу, чтобы изменить порядок</p>
        </header>
        <div id="chapters-list" class="chapters-list"></div>
        <div class="form">
          <input type="text" id="new-chapter-title" placeholder="Название новой главы">
          <button id="btn-add-chapter" class="btn-primary">Добавить главу</button>
        </div>
      </div>

      <!-- Subscription -->
      <div id="screen-subscription" class="screen hidden">
        <header class="header">
          <button class="back" data-back>← Назад</button>
          <h2>Подписка</h2>
        </header>
        <div id="sub-info" class="sub-info"></div>
        <div class="form">
          <input type="text" id="promo-code" placeholder="Промокод">
          <button id="btn-redeem" class="btn-primary">Активировать</button>
        </div>
      </div>
    </div>
  </div>
  <script src="/miniapp/app.js?v=2"></script>
</body>
</html>
