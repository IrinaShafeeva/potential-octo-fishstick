<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Мои воспоминания</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <link rel="stylesheet" href="/miniapp/styles.css?v=9">
</head>
<body>
  <div id="app">
    <div id="loading">Загрузка…</div>
    <div id="screens" class="hidden">
      <!-- Home -->
      <div id="screen-home" class="screen home-screen">
        <div class="home-bg"></div>
        <header class="home-header">
          <p class="home-welcome" id="home-welcome">Добро пожаловать!</p>
          <h1 class="home-title">Расскажите свою историю</h1>
          <div class="home-burger-wrap">
            <button id="btn-burger" class="home-burger" aria-label="Меню">≡</button>
            <div id="home-dropdown" class="home-dropdown hidden">
              <button class="home-dropdown-btn" data-screen="book">Моя книга</button>
              <button class="home-dropdown-btn" data-screen="subscription">Подписка</button>
            </div>
          </div>
        </header>
        <div class="home-content">
          <div class="home-record-row">
            <button type="button" class="home-text-link" data-screen="record">Ввести текст</button>
            <button id="btn-record-home" class="btn-record-main">
              <span class="btn-mic-icon"></span>
              <span id="home-record-status" class="btn-record-label">Записать</span>
            </button>
          </div>
          <p class="home-hint">Удерживайте кнопку для записи голоса</p>
        </div>
      </div>

      <!-- Record -->
      <div id="screen-record" class="screen hidden screen-padded">
        <header class="header header-compact">
          <button class="back" data-back>← Назад</button>
          <h2>Записать воспоминание</h2>
        </header>
        <div class="form">
          <button id="btn-record-voice" class="btn-record">
            <span class="btn-mic-icon"></span>
            <span id="record-status">Зажмите и говорите</span>
          </button>
          <p class="hint">Зажмите кнопку — идёт запись, отпустите — сохраняется</p>
          <hr class="record-divider">
          <textarea id="memory-text" placeholder="Или введите текст…" rows="3"></textarea>
          <button id="btn-save-memory" class="btn-primary">Сохранить текст</button>
        </div>
      </div>

      <!-- Book = Chapters + Memories (merged) -->
      <div id="screen-book" class="screen hidden screen-book">
        <header class="header header-compact">
          <button class="back" data-back>← Назад</button>
          <h2>Моя книга</h2>
          <p class="hint">Перетащите за ⋮⋮ для смены порядка. Нажмите — откроются воспоминания.</p>
        </header>
        <div id="book-chapters" class="book-chapters"></div>
        <div class="book-add-chapter">
          <input type="text" id="new-chapter-title" placeholder="Название новой главы">
          <button id="btn-add-chapter" class="btn-primary btn-compact">Добавить</button>
        </div>
        <div class="book-actions">
          <button id="btn-download-pdf" class="btn-primary">Скачать PDF</button>
        </div>
      </div>

      <!-- Memory Preview (after save text/voice) -->
      <div id="screen-preview" class="screen hidden screen-padded">
        <header class="header header-compact">
          <button class="back" id="btn-preview-back">← Назад</button>
          <h2 id="preview-title">Воспоминание</h2>
        </header>
        <div class="preview-content">
          <textarea id="preview-text" placeholder="Текст воспоминания…" rows="4"></textarea>
          <p id="preview-chapter-hint" class="hint"></p>
          <div class="preview-actions">
            <button id="btn-save-preview" class="btn-primary">Сохранить в главу</button>
            <button id="btn-fantasy" class="btn-secondary">Творческая версия</button>
          </div>
        </div>
      </div>

      <!-- Clarification (AI question) -->
      <div id="screen-clarification" class="screen hidden screen-padded">
        <header class="header header-compact">
          <button class="back" id="btn-clarification-back">← Назад</button>
          <h2>Уточнение</h2>
        </header>
        <div class="clarification-content">
          <p id="clarification-question" class="clarification-question"></p>
          <div class="form">
            <textarea id="clarification-answer" placeholder="Ваш ответ…" rows="2"></textarea>
            <button id="btn-send-clarification" class="btn-primary">Отправить</button>
            <button id="btn-skip-clarification" class="btn-secondary">Пропустить</button>
            <button id="btn-skip-all-clarification" class="btn-link">Без подробностей</button>
          </div>
        </div>
      </div>

      <!-- Subscription -->
      <div id="screen-subscription" class="screen hidden screen-padded">
        <header class="header header-compact">
          <button class="back" data-back>← Назад</button>
          <h2>Подписка</h2>
        </header>
        <div id="sub-info" class="sub-info"></div>
        <div class="form">
          <input type="text" id="promo-code" placeholder="Промокод">
          <button id="btn-redeem" class="btn-primary">Активировать</button>
        </div>
      </div>
    </div>
  </div>
  <script src="/miniapp/app.js?v=8"></script>
</body>
</html>
